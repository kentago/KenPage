<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Sjökrans Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0e1a;--panel:#10172a;--border:#212c47;--amber:#f5a623;--amber-dim:#7a5316;--ice:#7fd6e8;--text:#eef2fb;--muted:#6b7a99;--good:#7fd99a;--bad:#e2725b;--transfer:#b39ddb}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace;-webkit-user-select:none;user-select:none}

.topbar{display:flex;align-items:baseline;justify-content:space-between;padding:18px 32px 12px;border-bottom:1px solid var(--border)}
.app-title{font:700 30px/1 'Oswald',sans-serif;letter-spacing:2px;text-transform:uppercase}
.app-title span{color:var(--amber)}
.clock-block{text-align:right}a
.clock{font:600 40px/1 'Oswald',sans-serif;color:var(--amber);font-variant-numeric:tabular-nums}
.dateline{font-size:11px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-top:2px}
.nameday{font-size:11px;color:var(--ice);margin-top:3px}

.controls{display:flex;align-items:center;gap:12px;padding:10px 32px;border-bottom:1px solid var(--border)}
.mode-toggle{display:flex;gap:12px}
.mode-toggle label{font-size:13px;color:var(--muted);cursor:pointer;display:flex;align-items:center;gap:4px}
.mode-toggle label:has(input:checked){color:var(--amber)}
.mode-toggle input{accent-color:var(--amber);width:13px;height:13px}
.route{flex:1;font:500 18px/1 'Oswald',sans-serif;letter-spacing:1px;margin-left:16px}
.route .from{color:var(--amber)}
.route .arrow{color:var(--muted);margin:0 10px}
.route .to{color:var(--ice)}
.btn{font:600 13px/1 'Oswald',sans-serif;background:var(--panel);border:1px solid var(--border);color:var(--amber);border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px}
.btn:hover{background:var(--border)}
.btn-primary{background:var(--amber);color:#1a1306;border:none;border-radius:6px;width:auto;padding:8px 16px;text-transform:uppercase;letter-spacing:1px}

.grid{display:grid;grid-template-columns:1.4fr 1fr;height:calc(100vh - 105px);gap:1px;background:var(--border)}
.col{background:var(--bg);overflow-y:auto;padding:20px 28px}

.trip{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:16px 20px;margin-bottom:10px}
.trip:hover{border-color:var(--amber-dim)}
.trip-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.trip-time{font:600 26px/1 'Oswald',sans-serif;color:var(--amber);font-variant-numeric:tabular-nums}
.trip-time .arr{color:var(--muted);margin:0 8px;font-size:18px}
.badge{font-size:12px;padding:3px 8px;border-radius:4px}
.badge-dur{color:var(--ice);background:rgba(127,214,232,.08)}
.badge-xfer{color:var(--transfer);background:rgba(179,157,219,.08)}
.badge-direct{color:var(--good);background:rgba(127,217,154,.08)}
.leg{display:grid;grid-template-columns:55px 1fr;gap:6px;padding:6px 0;border-top:1px solid var(--border);font-size:12px}
.leg:first-child{border-top:none}
.leg-t{font:500 14px/1 'Oswald',sans-serif;color:var(--text)}
.leg-name{font-weight:600;color:var(--amber)}
.leg-name.walk{color:var(--muted)}
.leg-detail{color:var(--muted)}

.dep{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:12px 16px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
.dep-time{font:600 22px/1 'Oswald',sans-serif;color:var(--amber);margin-right:12px}
.dep-time.late{color:var(--bad)}
.dep-line{font-size:12px;color:var(--amber-dim);margin-right:8px}
.dep-dest{font:500 15px/1 'Oswald',sans-serif;color:var(--text)}
.dep-eta{font-size:13px;color:var(--muted)}

.news-item{display:block;text-decoration:none;padding:8px;margin:0 -8px;border-radius:4px;border-bottom:1px solid var(--border);transition:background .15s}
.news-item:hover{background:rgba(245,166,35,.05)}
.news-item:last-child{border-bottom:none}
.news-num{font:600 12px/1 'Oswald',sans-serif;color:#e2a07a;margin-right:6px}
.news-text{font-size:13px;line-height:1.4;color:var(--text)}
.news-meta{font-size:10px;color:var(--muted);margin-top:3px}

.weather{display:flex;gap:20px;padding:14px 0;border-top:1px solid var(--border);margin-top:12px}
.weather-day{flex:1}
.weather-lbl{font:600 11px/1 'Oswald',sans-serif;letter-spacing:1px;text-transform:uppercase;color:var(--ice);margin-bottom:4px}
.weather-ico{font-size:24px;line-height:1}
.weather-tmp{font:600 20px/1 'Oswald',sans-serif;color:var(--text);margin-top:3px}
.weather-tmp .lo{color:var(--muted);font-size:14px;margin-left:3px}
.weather-dsc{font-size:11px;color:var(--muted);margin-top:2px}

.stocks{border-top:1px solid var(--border);margin-top:12px;padding-top:12px}

.screensaver{position:fixed;inset:0;pointer-events:none;z-index:1}
.screensaver span{position:absolute;font:700 180px/1 'Oswald',sans-serif;color:rgba(245,166,35,.04);will-change:transform}

.gear{position:fixed;top:14px;right:14px;width:30px;height:30px;border-radius:50%;background:var(--panel);border:1px solid var(--border);color:var(--muted);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;z-index:50}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;z-index:100}
.modal-bg.open{display:flex}
.modal{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:24px;width:400px;max-width:90vw;max-height:85vh;overflow-y:auto;position:relative}
.modal h2{font:600 18px/1 'Oswald',sans-serif;margin-bottom:16px}
.modal label{display:block;font-size:11px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin:14px 0 5px}
.modal input{width:100%;padding:9px 11px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font:14px 'JetBrains Mono',monospace}
.modal input:focus{outline:none;border-color:var(--amber)}
.modal .hint{font-size:11px;color:var(--muted);margin-top:4px;line-height:1.4}
.modal .hint a{color:var(--ice)}
.modal .actions{display:flex;gap:8px;margin-top:16px}
.modal .actions button{font:600 13px/1 'Oswald',sans-serif;padding:9px 14px;border-radius:6px;border:none;cursor:pointer;text-transform:uppercase;letter-spacing:1px}
.modal .actions .primary{background:var(--amber);color:#1a1306}
.modal .actions .secondary{background:transparent;color:var(--muted);border:1px solid var(--border)}
.modal .close{position:absolute;top:12px;right:16px;cursor:pointer;color:var(--muted);font-size:18px}
.modal .suggestions{background:var(--bg);border:1px solid var(--border);border-radius:6px;margin-top:4px;max-height:140px;overflow-y:auto;display:none}
.modal .suggestions.open{display:block}
.modal .suggestions div{padding:7px 10px;font-size:12px;cursor:pointer;border-bottom:1px solid var(--border)}
.modal .suggestions div:last-child{border-bottom:none}
.modal .suggestions div:hover{background:rgba(245,166,35,.08)}
.modal .selected{color:var(--amber);font-size:11px;margin-top:3px}

.empty{color:var(--muted);font-size:13px;padding:16px 0}
.error{color:var(--bad);font-size:13px;padding:16px 0}

@media(max-width:720px){
  .grid{display:block;height:auto}
  .col{padding:16px 20px}
  .topbar{flex-direction:column;align-items:flex-start;gap:6px;padding:14px 20px 10px}
  .controls{flex-wrap:wrap;padding:10px 20px}
  .route{margin-left:0;margin-top:6px;width:100%}
  .app-title{font-size:24px}.clock{font-size:28px}
  .trip-time{font-size:22px}
  html,body{height:auto;overflow-y:auto}
}
</style>
</head>
<body>
<div class="gear" id="gear">⚙</div>
<div class="screensaver"><span id="ssLetter">S</span></div>

<div class="topbar">
  <div class="app-title">Sjökrans Dashboard<span>.</span></div>
  <div class="clock-block">
    <div class="clock" id="clock">--:--</div>
    <div class="dateline" id="date">—</div>
    <div class="nameday" id="nameday">—</div>
  </div>
</div>

<div class="controls">
  <div class="mode-toggle">
    <label><input type="radio" name="mode" value="trip" id="modeTrip" checked> Resa</label>
    <label><input type="radio" name="mode" value="dep" id="modeDep"> Avgångar</label>
  </div>
  <div class="route">
    <span class="from" id="rFrom">—</span><span class="arrow" id="rArrow">→</span><span class="to" id="rTo">—</span>
  </div>
  <button class="btn" id="swap" title="Byt riktning">⇄</button>
  <button class="btn btn-primary" id="refresh">Uppdatera</button>
</div>

<div class="grid">
  <div class="col" id="main"><div class="empty">Konfigurera stationer i ⚙</div></div>
  <div class="col">
    <div id="news"><div class="empty">Hämtar nyheter...</div></div>
    <div class="weather" id="weather"></div>
    <div class="stocks">
      <div class="tradingview-widget-container">
        <div class="tradingview-widget-container__widget"></div>
        <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-symbol-overview.js" async>
        {"symbols":[["OMXS30","OMXSTO:OMXS30|1D"],["Volvo B","OMXSTO:VOLV_B|1D"],["Ericsson B","OMXSTO:ERIC_B|1D"],["H&M B","OMXSTO:HM_B|1D"],["ABB","OMXSTO:ABB|1D"],["SEB A","OMXSTO:SEB_A|1D"]],"chartOnly":false,"width":"100%","height":"220","locale":"sv_SE","colorTheme":"dark","autosize":false,"showVolume":false,"showMA":false,"hideDateRanges":true,"hideMarketStatus":false,"hideSymbolLogo":true,"scalePosition":"right","scaleMode":"Normal","fontFamily":"Oswald,sans-serif","fontSize":"11","noTimeScale":false,"valuesTracking":"1","changeMode":"price-and-percent","chartType":"area","lineWidth":2,"dateRanges":["1d|1"],"isTransparent":true,"lineColor":"rgba(245,166,35,1)","topColor":"rgba(245,166,35,.1)","bottomColor":"rgba(245,166,35,0)"}
        </script>
      </div>
    </div>
  </div>
</div>

<div class="modal-bg" id="modalBg">
  <div class="modal">
    <div class="close" id="modalClose">✕</div>
    <h2>Inställningar</h2>
    <label>API-nyckel (ResRobot v2.1)</label>
    <input type="password" id="inKey" placeholder="accessId" autocomplete="off">
    <div class="hint">Gratis på <a href="https://www.trafiklab.se" target="_blank">trafiklab.se</a></div>
    <label>Från-station</label>
    <input type="text" id="inFrom" placeholder="Sök..." autocomplete="off">
    <div class="suggestions" id="sugFrom"></div>
    <div class="selected" id="selFrom"></div>
    <label>Till-station</label>
    <input type="text" id="inTo" placeholder="Sök..." autocomplete="off">
    <div class="suggestions" id="sugTo"></div>
    <div class="selected" id="selTo"></div>
    <div class="actions">
      <button class="secondary" id="btnClear">Rensa</button>
      <button class="primary" id="btnSave">Spara</button>
      <button class="secondary" id="btnShare" style="margin-left:auto">📋 Dela</button>
    </div>
    <div class="hint" id="shareOut" style="word-break:break-all;margin-top:6px"></div>
  </div>
</div>
<script>
const STORE='sjokrans-cfg', STORE_S='sjokrans-stations';
let cfg={apiKey:''}, stations={from:null,to:null};

// --- Persistence ---
function save(){localStorage.setItem(STORE,JSON.stringify(cfg))}
function saveS(){localStorage.setItem(STORE_S,JSON.stringify(stations))}
function load(){
  try{cfg=JSON.parse(localStorage.getItem(STORE))||cfg}catch(e){}
  try{const s=JSON.parse(localStorage.getItem(STORE_S));if(s){stations=s}}catch(e){}
  // URL params: ?t=passphrase, ?from=id:name, ?to=id:name
  const p=new URLSearchParams(location.search);
  if(p.get('t')){try{const c=atob('Ql1VXAJFAQNeX1tcA18GBkANQFVRSlcbRVleDlVABgIRXglZ'),pass=p.get('t');let r='';for(let i=0;i<c.length;i++)r+=String.fromCharCode(c.charCodeAt(i)^pass.charCodeAt(i%pass.length));if(r.includes('-')&&r.length>20){cfg.apiKey=r;save()}}catch(e){}}
  if(p.get('key')){cfg.apiKey=p.get('key');save()}
  if(p.get('from')){const[id,...n]=p.get('from').split(':');stations.from={id,name:n.join(':')};saveS()}
  if(p.get('to')){const[id,...n]=p.get('to').split(':');stations.to={id,name:n.join(':')};saveS()}
  if(p.has('t')||p.has('key')||p.has('from')||p.has('to'))history.replaceState({},'',location.pathname);
}

// --- Fetch helper ---
async function api(url){
  const r=await fetch(url);
  if(!r.ok)throw new Error('HTTP '+r.status);
  return r.json();
}

// --- Clock ---
function tick(){
  const n=new Date(),D=['Sön','Mån','Tis','Ons','Tor','Fre','Lör'],M=['jan','feb','mar','apr','maj','jun','jul','aug','sep','okt','nov','dec'];
  document.getElementById('clock').textContent=String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');
  document.getElementById('date').textContent=D[n.getDay()]+' '+n.getDate()+' '+M[n.getMonth()];
}
setInterval(tick,1000);tick();

// --- Nameday ---
async function nameday(){
  const n=new Date(),url=`https://sholiday.faboul.se/dagar/v2.1/${n.getFullYear()}/${String(n.getMonth()+1).padStart(2,'0')}/${String(n.getDate()).padStart(2,'0')}`;
  try{const d=await api(url);const names=d.dagar?.[0]?.namnsdag;document.getElementById('nameday').textContent=names?.length?'Namnsdag: '+names.join(' & '):''}catch(e){document.getElementById('nameday').textContent=''}
}

// --- Weather ---
const COORDS={'kungsbacka':{lat:57.49,lon:12.08},'göteborg':{lat:57.71,lon:11.97},'stockholm':{lat:59.33,lon:18.07},'malmö':{lat:55.60,lon:13.00},'halmstad':{lat:56.67,lon:12.86},'varberg':{lat:57.11,lon:12.25},'borås':{lat:57.72,lon:12.94},'linköping':{lat:58.41,lon:15.62},'uppsala':{lat:59.86,lon:17.64},'västerås':{lat:59.61,lon:16.55},'karlstad':{lat:59.38,lon:13.50},'lund':{lat:55.70,lon:13.19}};
const WMO={0:'☀️ Klart',1:'🌤️ Mest klart',2:'⛅ Växlande',3:'☁️ Mulet',45:'🌫️ Dimma',51:'🌦️ Duggregn',61:'🌧️ Regn',63:'🌧️ Regn',65:'🌧️ Kraftigt regn',71:'🌨️ Snö',73:'🌨️ Snö',80:'🌦️ Skurar',95:'⛈️ Åska'};
async function weather(){
  let c={lat:57.49,lon:12.08};
  if(stations.from){const n=stations.from.name.toLowerCase();for(const[k,v]of Object.entries(COORDS)){if(n.includes(k)){c=v;break}}}
  try{
    const d=await(await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${c.lat}&longitude=${c.lon}&daily=weathercode,temperature_2m_max,temperature_2m_min&timezone=Europe/Stockholm&forecast_days=3`)).json();
    const lbl=['Idag','Imorgon','Övermorgon'];
    document.getElementById('weather').innerHTML=d.daily.time.map((t,i)=>{const w=WMO[d.daily.weathercode[i]]||'❓ Okänt';const[ico,dsc]=w.split(' ');return`<div class="weather-day"><div class="weather-lbl">${lbl[i]}</div><div class="weather-ico">${ico}</div><div class="weather-tmp">${Math.round(d.daily.temperature_2m_max[i])}°<span class="lo">${Math.round(d.daily.temperature_2m_min[i])}°</span></div><div class="weather-dsc">${dsc||''}</div></div>`}).join('');
  }catch(e){document.getElementById('weather').innerHTML='<div class="empty">Väder ej tillgängligt</div>'}
}

// --- News ---
const REGIONS=[
  {kw:['kungsbacka','varberg','falkenberg','halmstad','laholm','anneberg'],id:128,lbl:'Halland'},
  {kw:['göteborg','mölndal','partille','lerum','kungälv','uddevalla','trollhättan','borås'],id:104,lbl:'Väst'},
  {kw:['malmö','lund','helsingborg','kristianstad','hässleholm','ystad'],id:96,lbl:'Skåne'},
  {kw:['stockholm','solna','sundbyberg','nacka','huddinge','södertälje'],id:103,lbl:'Stockholm'},
  {kw:['linköping','norrköping','motala'],id:160,lbl:'Östergötland'},
  {kw:['jönköping','värnamo','nässjö'],id:91,lbl:'Jönköping'},
  {kw:['karlstad','arvika','sunne'],id:93,lbl:'Värmland'},
  {kw:['örebro','kumla','karlskoga'],id:159,lbl:'Örebro'},
  {kw:['uppsala','enköping'],id:114,lbl:'Uppsala'},
  {kw:['västerås','eskilstuna'],id:112,lbl:'Västmanland'},
  {kw:['gävle','sandviken'],id:99,lbl:'Gävleborg'},
  {kw:['falun','borlänge','mora'],id:161,lbl:'Dalarna'},
  {kw:['sundsvall','härnösand'],id:110,lbl:'Västernorrland'},
  {kw:['umeå','skellefteå'],id:109,lbl:'Västerbotten'},
  {kw:['luleå','piteå','kiruna'],id:98,lbl:'Norrbotten'},
];
function findRegion(name){
  if(!name)return null;
  const n=name.toLowerCase();
  return REGIONS.find(r=>r.kw.some(k=>n.includes(k)))||null;
}
async function parseAtom(url,max){
  const items=[];
  try{const r=await fetch(url);if(!r.ok)return items;const xml=new DOMParser().parseFromString(await r.text(),'text/xml');
  for(const e of xml.querySelectorAll('entry')){
    const title=(e.querySelector('title')?.textContent||'').trim();
    const link=e.querySelector('link')?.getAttribute('href')||'';
    const pub=e.querySelector('published')?.textContent||'';
    if(title.length>10){const t=new Date(pub);items.push({title,link,time:isNaN(t)?'':t.toLocaleTimeString('sv-SE',{hour:'2-digit',minute:'2-digit'})})}
    if(items.length>=max)break;
  }}catch(e){}
  return items;
}
async function news(){
  const el=document.getElementById('news');
  const region=findRegion(stations.from?.name);
  let items=[];
  if(region)items=await parseAtom('https://api.sr.se/api/rss/program/'+region.id,2);
  const nat=await parseAtom('https://api.sr.se/api/rss/program/4540',4);
  items.push(...nat.map(n=>({...n,title:n.title.replace(/^Ekot \d{2}:\d{2}\s*/,'')})).filter(n=>n.title.length>5));
  items=items.slice(0,6);
  if(!items.length){el.innerHTML='<div class="empty">Inga nyheter just nu</div>';return}
  el.innerHTML=items.map((n,i)=>`<a class="news-item" href="${n.link}" target="_blank"><span class="news-num">${i+1}</span><span class="news-text">${n.title}</span><div class="news-meta">${i<(region?2:0)?'📍 Lokalt':'Ekot'}${n.time?' · '+n.time:''}</div></a>`).join('');
}

// --- Trips ---
async function trips(){
  const el=document.getElementById('main');
  if(!cfg.apiKey||!stations.from||!stations.to){el.innerHTML='<div class="empty">Konfigurera i ⚙</div>';return}
  el.innerHTML='<div class="empty">Söker...</div>';
  try{
    const d=await api(`https://api.resrobot.se/v2.1/trip?originId=${stations.from.id}&destId=${stations.to.id}&format=json&numF=4&accessId=${cfg.apiKey}`);
    const t=d.Trip||[];
    if(!t.length){el.innerHTML='<div class="empty">Inga resor hittades</div>';return}
    el.innerHTML=t.map(trip=>{
      const legs=trip.LegList?.Leg||[];if(!legs.length)return'';
      const dep=legs[0].Origin,arr=legs[legs.length-1].Destination;
      const mins=Math.round((new Date(arr.date+'T'+arr.time)-new Date(dep.date+'T'+dep.time))/60000);
      const h=Math.floor(mins/60),m=mins%60,dur=h?h+'h '+m+'m':m+'m';
      const xfer=Math.max(0,legs.filter(l=>l.type!=='WALK'&&l.type!=='TRSF').length-1);
      return`<div class="trip"><div class="trip-head"><div class="trip-time">${dep.time.slice(0,5)}<span class="arr">→</span>${arr.time.slice(0,5)}</div><div><span class="badge badge-dur">${dur}</span> <span class="badge ${xfer?'badge-xfer':'badge-direct'}">${xfer?xfer+' byte':'Direkt'}</span></div></div>${legs.map(l=>{const w=l.type==='WALK'||l.type==='TRSF';const p=l.Product||{};return`<div class="leg"><div class="leg-t">${l.Origin.time.slice(0,5)}–${l.Destination.time.slice(0,5)}</div><div><div class="leg-name${w?' walk':''}">${w?'🚶 Gång':(p.catOutL||p.name||'')+(p.num?' '+p.num:'')}</div><div class="leg-detail">${l.Origin.name} → ${l.Destination.name}</div></div></div>`}).join('')}</div>`;
    }).join('');
  }catch(e){el.innerHTML='<div class="error">'+e.message+'</div>'}
}

// --- Departures ---
async function departures(){
  const el=document.getElementById('main');
  if(!cfg.apiKey||!stations.from){el.innerHTML='<div class="empty">Konfigurera i ⚙</div>';return}
  el.innerHTML='<div class="empty">Hämtar...</div>';
  try{
    const d=await api(`https://api.resrobot.se/v2.1/departureBoard?id=${stations.from.id}&format=json&duration=90&accessId=${cfg.apiKey}`);
    const deps=d.Departure||[];
    if(!deps.length){el.innerHTML='<div class="empty">Inga avgångar</div>';return}
    el.innerHTML=deps.slice(0,8).map(dep=>{
      const p=dep.Product||dep.ProductAtStop?.[0]||{};
      const t=dep.rtTime||dep.time||'';const late=dep.rtTime&&dep.rtTime!==dep.time;
      const eta=Math.round((new Date((dep.rtDate||dep.date)+'T'+t)-new Date())/60000);
      return`<div class="dep"><div><span class="dep-time${late?' late':''}">${t.slice(0,5)}</span><span class="dep-line">${p.catOutL||''} ${p.num||''}</span><span class="dep-dest">${dep.direction||''}</span></div><div class="dep-eta">${eta<=0?'nu':eta+' min'}</div></div>`;
    }).join('');
  }catch(e){el.innerHTML='<div class="error">'+e.message+'</div>'}
}

function refresh(){document.getElementById('modeDep').checked?departures():trips()}
function updateRoute(){
  document.getElementById('rFrom').textContent=stations.from?.name||'—';
  document.getElementById('rTo').textContent=stations.to?.name||'—';
  const show=!document.getElementById('modeDep').checked;
  document.getElementById('rArrow').style.display=show?'':'none';
  document.getElementById('rTo').style.display=show?'':'none';
}

// --- Autocomplete ---
let acTimer;
function setupAC(inputId,sugId,selId,key){
  const inp=document.getElementById(inputId),sug=document.getElementById(sugId);
  inp.addEventListener('input',()=>{
    clearTimeout(acTimer);const q=inp.value.trim();
    if(q.length<2){sug.classList.remove('open');return}
    if(!cfg.apiKey){sug.innerHTML='<div>API-nyckel saknas</div>';sug.classList.add('open');return}
    acTimer=setTimeout(async()=>{
      try{const d=await api('https://api.resrobot.se/v2.1/location.name?input='+encodeURIComponent(q)+'&format=json&accessId='+cfg.apiKey);
      const stops=(d.stopLocationOrCoordLocation||[]).map(s=>s.StopLocation).filter(Boolean);
      if(!stops.length){sug.innerHTML='<div>Inga resultat</div>';sug.classList.add('open');return}
      sug.innerHTML=stops.slice(0,6).map(s=>`<div data-id="${s.extId}" data-name="${s.name}">${s.name}</div>`).join('');
      sug.classList.add('open');
      sug.querySelectorAll('div').forEach(el=>el.onclick=()=>{
        stations[key]={id:el.dataset.id,name:el.dataset.name};inp.value=el.dataset.name;sug.classList.remove('open');saveS();
        document.getElementById(selId).textContent='✓ '+el.dataset.name;
      });}catch(e){sug.innerHTML='<div>Fel: '+e.message+'</div>';sug.classList.add('open')}
    },350);
  });
  inp.addEventListener('blur',()=>setTimeout(()=>sug.classList.remove('open'),200));
}

// --- Modal ---
const modal=document.getElementById('modalBg');
document.getElementById('gear').onclick=()=>{modal.classList.add('open');document.getElementById('inKey').value=cfg.apiKey;document.getElementById('inFrom').value=stations.from?.name||'';document.getElementById('inTo').value=stations.to?.name||'';document.getElementById('selFrom').textContent=stations.from?'✓ '+stations.from.name:'';document.getElementById('selTo').textContent=stations.to?'✓ '+stations.to.name:''};
document.getElementById('modalClose').onclick=()=>modal.classList.remove('open');
modal.onclick=e=>{if(e.target===modal)modal.classList.remove('open')};
document.getElementById('btnSave').onclick=()=>{cfg.apiKey=document.getElementById('inKey').value.trim();save();saveS();updateRoute();modal.classList.remove('open');refresh();news()};
document.getElementById('btnClear').onclick=()=>{cfg={apiKey:''};stations={from:null,to:null};save();localStorage.removeItem(STORE_S);updateRoute();document.getElementById('main').innerHTML='<div class="empty">Konfigurera i ⚙</div>'};
document.getElementById('btnShare').onclick=()=>{const el=document.getElementById('shareOut');if(!cfg.apiKey){el.textContent='Spara nyckel först';return}let u=location.origin+location.pathname+'?t=sommar26';if(stations.from)u+='&from='+encodeURIComponent(stations.from.id+':'+stations.from.name);if(stations.to)u+='&to='+encodeURIComponent(stations.to.id+':'+stations.to.name);navigator.clipboard.writeText(u).then(()=>el.textContent='Kopierad ✓').catch(()=>el.textContent=u)};

// --- Mode & controls ---
document.getElementById('modeTrip').onchange=()=>{updateRoute();refresh()};
document.getElementById('modeDep').onchange=()=>{updateRoute();refresh()};
document.getElementById('swap').onclick=()=>{[stations.from,stations.to]=[stations.to,stations.from];saveS();updateRoute();refresh();news()};
document.getElementById('refresh').onclick=refresh;

// --- Screensaver ---
(function(){const el=document.getElementById('ssLetter');let x=Math.random()*(innerWidth-180),y=Math.random()*(innerHeight-180),dx=.7,dy=.5;(function anim(){x+=dx;y+=dy;if(x<=0||x>=innerWidth-180)dx*=-1;if(y<=0||y>=innerHeight-180)dy*=-1;el.style.transform=`translate(${x}px,${y}px)`;requestAnimationFrame(anim)})()})();

// --- Init ---
load();
setupAC('inFrom','sugFrom','selFrom','from');
setupAC('inTo','sugTo','selTo','to');
updateRoute();
if(!cfg.apiKey||!stations.from)modal.classList.add('open');
else refresh();
news();nameday();weather();
setInterval(news,15*60000);setInterval(refresh,2*60000);setInterval(nameday,3600000);setInterval(weather,1800000);
</script>
</body>
