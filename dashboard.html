<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Sjökrans Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0e1a;--panel:#10172a;--border:#212c47;--amber:#f5a623;--amber-dim:#7a5316;--ice:#7fd6e8;--text:#eef2fb;--muted:#6b7a99;--good:#7fd99a;--bad:#e2725b;--transfer:#b39ddb}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace;-webkit-user-select:none;user-select:none}

.topbar{display:flex;align-items:baseline;justify-content:space-between;padding:18px 32px 12px;border-bottom:1px solid var(--border)}
.app-title{font:700 30px/1 'Oswald',sans-serif;letter-spacing:2px;text-transform:uppercase}
.app-title span{color:var(--amber)}
.clock-block{text-align:right}
.clock{font:600 40px/1 'Oswald',sans-serif;color:var(--amber);font-variant-numeric:tabular-nums}
.dateline{font-size:11px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-top:2px}
.nameday{font-size:11px;color:var(--ice);margin-top:3px}

.controls{display:flex;align-items:center;gap:12px;padding:0 0 14px;border-bottom:1px solid var(--border);margin-bottom:14px}
.mode-toggle{display:flex;gap:12px}
.mode-toggle label{font-size:13px;color:var(--muted);cursor:pointer;display:flex;align-items:center;gap:4px}
.mode-toggle label:has(input:checked){color:var(--amber)}
.mode-toggle input{accent-color:var(--amber);width:13px;height:13px}
.route{flex:1;font:500 18px/1 'Oswald',sans-serif;letter-spacing:1px;margin-left:16px}
.route .from{color:var(--amber)}
.route .arrow{color:var(--muted);margin:0 10px}
.route .to{color:var(--ice)}
.btn{font:600 13px/1 'Oswald',sans-serif;background:var(--panel);border:1px solid var(--border);color:var(--amber);border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px}
.btn:hover{background:var(--border)}
.btn-primary{background:var(--amber);color:#1a1306;border:none;border-radius:6px;width:auto;padding:8px 16px;text-transform:uppercase;letter-spacing:1px}

.grid{display:grid;grid-template-columns:1.4fr 1fr;height:calc(100vh - 75px);gap:1px;background:var(--border)}
.col{background:var(--bg);overflow-y:auto;padding:20px 28px}

.trip{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:16px 20px;margin-bottom:10px}
.trip:hover{border-color:var(--amber-dim)}
.trip-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.trip-time{font:600 26px/1 'Oswald',sans-serif;color:var(--amber);font-variant-numeric:tabular-nums}
.trip-time .arr{color:var(--muted);margin:0 8px;font-size:18px}
.badge{font-size:12px;padding:3px 8px;border-radius:4px}
.badge-dur{color:var(--ice);background:rgba(127,214,232,.08)}
.badge-xfer{color:var(--transfer);background:rgba(179,157,219,.08)}
.badge-direct{color:var(--good);background:rgba(127,217,154,.08)}
.leg{display:grid;grid-template-columns:55px 1fr;gap:6px;padding:6px 0;border-top:1px solid var(--border);font-size:12px}
.leg:first-child{border-top:none}
.leg-t{font:500 14px/1 'Oswald',sans-serif;color:var(--text)}
.leg-name{font-weight:600;color:var(--amber)}
.leg-name.walk{color:var(--muted)}
.leg-detail{color:var(--muted)}

.dep{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:12px 16px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
.dep-time{font:600 22px/1 'Oswald',sans-serif;color:var(--amber);margin-right:12px}
.dep-time.late{color:var(--bad)}
.dep-line{font-size:12px;color:var(--amber-dim);margin-right:8px}
.dep-dest{font:500 15px/1 'Oswald',sans-serif;color:var(--text)}
.dep-eta{font-size:13px;color:var(--muted)}

.news-item{display:block;text-decoration:none;padding:8px;margin:0 -8px;border-radius:4px;border-bottom:1px solid var(--border);transition:background .15s}
.news-item:hover{background:rgba(245,166,35,.05)}
.news-item:last-child{border-bottom:none}
.news-num{font:600 12px/1 'Oswald',sans-serif;color:#e2a07a;margin-right:6px}
.news-text{font-size:13px;line-height:1.4;color:var(--text)}
.news-meta{font-size:10px;color:var(--muted);margin-top:3px}

.weather{display:flex;gap:20px;padding:14px 0;border-top:1px solid var(--border);margin-top:12px}
.weather-day{flex:1}
.weather-lbl{font:600 11px/1 'Oswald',sans-serif;letter-spacing:1px;text-transform:uppercase;color:var(--ice);margin-bottom:4px}
.weather-ico{font-size:24px;line-height:1}
.weather-tmp{font:600 20px/1 'Oswald',sans-serif;color:var(--text);margin-top:3px}
.weather-tmp .lo{color:var(--muted);font-size:14px;margin-left:3px}
.weather-dsc{font-size:11px;color:var(--muted);margin-top:2px}

.stocks{border-top:1px solid var(--border);margin-top:12px;padding-top:12px}

.workinfo{border-top:1px solid var(--border);margin-top:12px;padding-top:12px}
.workinfo-title{font:600 11px/1 'Oswald',sans-serif;letter-spacing:1.5px;text-transform:uppercase;color:var(--ice);margin-bottom:10px}
.workinfo-row{display:flex;align-items:center;gap:12px;background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:10px 14px}
.workinfo-icon{font-size:26px;line-height:1}
.workinfo-text{font-size:13px;color:var(--text)}
.workinfo-sub{font-size:11px;color:var(--muted);margin-top:2px}

.screensaver{position:fixed;inset:0;pointer-events:none;z-index:1}
.screensaver span{position:absolute;font:700 180px/1 'Oswald',sans-serif;color:rgba(245,166,35,.04);will-change:transform}

.gear{position:fixed;top:14px;right:14px;width:30px;height:30px;border-radius:50%;background:var(--panel);border:1px solid var(--border);color:var(--muted);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;z-index:50}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;z-index:100}
.modal-bg.open{display:flex}
.modal{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:24px;width:400px;max-width:90vw;max-height:85vh;overflow-y:auto;position:relative}
.modal h2{font:600 18px/1 'Oswald',sans-serif;margin-bottom:16px}
.modal label{display:block;font-size:11px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin:14px 0 5px}
.modal input,.modal select{width:100%;padding:9px 11px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font:14px 'JetBrains Mono',monospace}
.modal input:focus,.modal select:focus{outline:none;border-color:var(--amber)}
.modal .hint{font-size:11px;color:var(--muted);margin-top:4px;line-height:1.4}
.modal .hint a{color:var(--ice)}
.modal .actions{display:flex;gap:8px;margin-top:16px}
.modal .actions button{font:600 13px/1 'Oswald',sans-serif;padding:9px 14px;border-radius:6px;border:none;cursor:pointer;text-transform:uppercase;letter-spacing:1px}
.modal .actions .primary{background:var(--amber);color:#1a1306}
.modal .actions .secondary{background:transparent;color:var(--muted);border:1px solid var(--border)}
.modal .close{position:absolute;top:12px;right:16px;cursor:pointer;color:var(--muted);font-size:18px}
.modal .suggestions{background:var(--bg);border:1px solid var(--border);border-radius:6px;margin-top:4px;max-height:140px;overflow-y:auto;display:none}
.modal .suggestions.open{display:block}
.modal .suggestions div{padding:7px 10px;font-size:12px;cursor:pointer;border-bottom:1px solid var(--border)}
.modal .suggestions div:last-child{border-bottom:none}
.modal .suggestions div:hover{background:rgba(245,166,35,.08)}
.modal .selected{color:var(--amber);font-size:11px;margin-top:3px}
.stock-row{display:flex;align-items:center;justify-content:space-between;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-size:12px}
.stock-row .rm{color:var(--bad);cursor:pointer;font-size:14px;line-height:1;padding:0 4px}

.empty{color:var(--muted);font-size:13px;padding:16px 0}
.error{color:var(--bad);font-size:13px;padding:16px 0}

@media(max-width:720px){
  .grid{display:block;height:auto}
  .col{padding:16px 20px}
  .topbar{flex-direction:column;align-items:flex-start;gap:6px;padding:14px 20px 10px}
  .controls{flex-wrap:wrap;padding:10px 20px}
  .route{margin-left:0;margin-top:6px;width:100%}
  .app-title{font-size:24px}.clock{font-size:28px}
  .trip-time{font-size:22px}
  html,body{height:auto;overflow-y:auto}
}
</style>
</head>
<body>
<div class="gear" id="gear">⚙</div>
<div class="screensaver"><span id="ssLetter">S</span></div>

<div class="topbar">
  <div class="app-title">Sjökrans Dashboard<span>.</span></div>
  <div class="clock-block">
    <div class="clock" id="clock">--:--</div>
    <div class="dateline" id="date">—</div>
    <div class="nameday" id="nameday">—</div>
  </div>
</div>

<div class="grid">
  <div class="col" id="main">
    <div class="controls" id="controls">
      <div class="mode-toggle">
        <label><input type="radio" name="mode" value="trip" id="modeTrip" checked> Resa</label>
        <label><input type="radio" name="mode" value="dep" id="modeDep"> Avgångar</label>
      </div>
      <div class="route">
        <span class="from" id="rFrom">—</span><span class="arrow" id="rArrow">→</span><span class="to" id="rTo">—</span>
      </div>
      <button class="btn" id="swap" title="Byt riktning">⇄</button>
      <button class="btn btn-primary" id="refresh">Uppdatera</button>
    </div>
    <div id="tripResults"><div class="empty">Konfigurera stationer i ⚙</div></div>
  </div>
  <div class="col">
    <div id="news"><div class="empty">Hämtar nyheter...</div></div>
    <div class="weather" id="weather"></div>
    <div class="workinfo" id="workinfoWrap">
      <div class="workinfo-title">Work info</div>
      <div id="workinfoContent"><span class="empty">Hämtar...</span></div>
    </div>
    <div class="module-slot" data-module="modules/badtemperatur.html"></div>
    <div class="module-slot" data-module="modules/elpris.html"></div>
    <div class="stocks" id="stocksWrap">
      <div class="tradingview-widget-container" id="stocksContainer">
        <div class="tradingview-widget-container__widget"></div>
      </div>
    </div>
  </div>
</div>

<div class="modal-bg" id="modalBg">
  <div class="modal">
    <div class="close" id="modalClose">✕</div>
    <h2>Inställningar</h2>
    <label>API-nyckel (ResRobot v2.1)</label>
    <input type="password" id="inKey" placeholder="accessId" autocomplete="off">
    <div class="hint">Gratis på <a href="https://www.trafiklab.se" target="_blank">trafiklab.se</a></div>
    <label>Från-station</label>
    <input type="text" id="inFrom" placeholder="Sök..." autocomplete="off">
    <div class="suggestions" id="sugFrom"></div>
    <div class="selected" id="selFrom"></div>
    <label>Till-station</label>
    <input type="text" id="inTo" placeholder="Sök..." autocomplete="off">
    <div class="suggestions" id="sugTo"></div>
    <div class="selected" id="selTo"></div>
    <label>Visa sektioner</label>
    <div style="display:flex;gap:14px;flex-wrap:wrap;margin-top:4px;">
      <label style="margin:0;font-size:12px;color:var(--text);cursor:pointer"><input type="checkbox" id="togTravel" checked style="accent-color:var(--amber)"> Resor</label>
      <label style="margin:0;font-size:12px;color:var(--text);cursor:pointer"><input type="checkbox" id="togNews" checked style="accent-color:var(--amber)"> Nyheter</label>
      <label style="margin:0;font-size:12px;color:var(--text);cursor:pointer"><input type="checkbox" id="togWeather" checked style="accent-color:var(--amber)"> Väder</label>
      <label style="margin:0;font-size:12px;color:var(--text);cursor:pointer"><input type="checkbox" id="togBath" checked style="accent-color:var(--amber)"> Badtemp</label>
      <label style="margin:0;font-size:12px;color:var(--text);cursor:pointer"><input type="checkbox" id="togElpris" checked style="accent-color:var(--amber)"> Elpris</label>
      <label style="margin:0;font-size:12px;color:var(--text);cursor:pointer"><input type="checkbox" id="togStocks" checked style="accent-color:var(--amber)"> Aktier</label>
    </div>
    <label>Badtemperatur — plats</label>
    <select id="inBathLoc">
      <option value="">Auto (närmast från-station)</option>
      <option value="kungsbacka">Kungsbacka</option>
      <option value="göteborg">Göteborg</option>
      <option value="varberg">Varberg</option>
      <option value="falkenberg">Falkenberg</option>
      <option value="halmstad">Halmstad</option>
      <option value="malmö">Malmö</option>
      <option value="lund">Lund</option>
      <option value="helsingborg">Helsingborg</option>
      <option value="ystad">Ystad</option>
      <option value="stockholm">Stockholm</option>
      <option value="gävle">Gävle</option>
      <option value="sundsvall">Sundsvall</option>
      <option value="härnösand">Härnösand</option>
      <option value="umeå">Umeå</option>
      <option value="skellefteå">Skellefteå</option>
      <option value="luleå">Luleå</option>
      <option value="piteå">Piteå</option>
    </select>
    <div class="hint">Väljer de 3 närmaste badplatserna till denna ort istället för till din från-station.</div>
    <label>Elpris — område</label>
    <select id="inElZone">
      <option value="">Auto (baserat på från-station)</option>
      <option value="SE1">SE1 — Luleå / Norrbotten</option>
      <option value="SE2">SE2 — Sundsvall / Norra Mellansverige</option>
      <option value="SE3">SE3 — Stockholm / Södra Mellansverige</option>
      <option value="SE4">SE4 — Malmö / Göteborg / Södra Sverige</option>
    </select>
    <div class="hint">Låser elprisområdet oavsett vilken från-station som är vald.</div>
    <label>Aktier i listan (max 8)</label>
    <div id="stocksList" style="display:flex;flex-direction:column;gap:4px;"></div>
    <div style="display:flex;gap:6px;margin-top:8px;">
      <select id="inAddStock" style="flex:1;"></select>
      <button type="button" id="btnAddStock" class="btn" style="width:auto;padding:0 12px;border-radius:6px;">+ Lägg till</button>
    </div>
    <div class="actions">
      <button class="secondary" id="btnClear">Rensa</button>
      <button class="primary" id="btnSave">Spara</button>
      <button class="secondary" id="btnShare" style="margin-left:auto">📋 Dela</button>
    </div>
    <div class="hint" id="shareOut" style="word-break:break-all;margin-top:6px"></div>
  </div>
</div>
<script>
const STORE = 'sjokrans-cfg';
const STORE_S = 'sjokrans-stations';

let cfg = {
  apiKey: '',
  bathLocation: '',
  elZone: '',
  stocks: ['OMXSTO:OMXS30', 'OMXSTO:VOLV_B', 'OMXSTO:ERIC_B', 'OMXSTO:HM_B', 'OMXSTO:ABB', 'OMXSTO:SEB_A'],
  show: { travel: true, news: true, weather: true, bath: true, elpris: true, stocks: true }
};
let stations = { from: null, to: null };

// --- Persistence ---

// Which dashboard sections can be toggled on/off, and where they live in the DOM.
// checkboxId follows the pattern "tog" + Capitalized key (e.g. travel -> togTravel).
const SECTION_TOGGLES = [
  { key: 'travel',  elId: 'main',        checkboxId: 'togTravel' },
  { key: 'news',    elId: 'news',        checkboxId: 'togNews' },
  { key: 'weather', elId: 'weather',     checkboxId: 'togWeather' },
  { key: 'bath',    elId: 'bathWrap',    checkboxId: 'togBath' },
  { key: 'elpris',  elId: 'elprisWrap',  checkboxId: 'togElpris' },
  { key: 'stocks',  elId: 'stocksWrap',  checkboxId: 'togStocks' }
];

function save() {
  localStorage.setItem(STORE, JSON.stringify(cfg));
}

function saveS() {
  localStorage.setItem(STORE_S, JSON.stringify(stations));
}

function applyToggles() {
  for (const { key, elId } of SECTION_TOGGLES) {
    document.getElementById(elId).style.display = cfg.show[key] ? '' : 'none';
  }
}

function load() {
  try {
    const raw = JSON.parse(localStorage.getItem(STORE));
    if (raw) {
      cfg.apiKey = raw.apiKey || '';
      cfg.bathLocation = raw.bathLocation || '';
      cfg.elZone = raw.elZone || '';
      if (Array.isArray(raw.stocks) && raw.stocks.length) cfg.stocks = raw.stocks;
      cfg.show = {};
      for (const { key } of SECTION_TOGGLES) {
        cfg.show[key] = raw.show?.[key] !== false;
      }
    }
  } catch (e) { /* no saved config yet */ }

  try {
    const s = JSON.parse(localStorage.getItem(STORE_S));
    if (s) stations = s;
  } catch (e) { /* no saved stations yet */ }

  // Optional URL params for quick setup / sharing a preconfigured link:
  //   ?t=<passphrase>   lightly obfuscated API key (see btnShare below — NOT real security,
  //                     just avoids the raw key sitting in plain sight in a shared URL)
  //   ?key=<apiKey>     API key in plain text
  //   ?from=id:name     origin station
  //   ?to=id:name       destination station
  const p = new URLSearchParams(location.search);
  if (p.get('t')) {
    try {
      const encoded = atob('WltXQggGAQYZW19eEUYFAgBWRlFfSw4cBAUHCF1dR19TA1cA');
      const pass = p.get('t');
      let decoded = '';
      for (let i = 0; i < encoded.length; i++) {
        decoded += String.fromCharCode(encoded.charCodeAt(i) ^ pass.charCodeAt(i % pass.length));
      }
      if (decoded.includes('-') && decoded.length > 20) {
        cfg.apiKey = decoded;
        save();
      }
    } catch (e) { /* wrong passphrase or malformed payload — ignore */ }
  }
  if (p.get('key')) { cfg.apiKey = p.get('key'); save(); }
  if (p.get('from')) {
    const [id, ...n] = p.get('from').split(':');
    stations.from = { id, name: n.join(':') };
    saveS();
  }
  if (p.get('to')) {
    const [id, ...n] = p.get('to').split(':');
    stations.to = { id, name: n.join(':') };
    saveS();
  }
  if (p.has('t') || p.has('key') || p.has('from') || p.has('to')) {
    history.replaceState({}, '', location.pathname);
  }
}

// --- Fetch helper ---
async function api(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error('HTTP ' + r.status);
  return r.json();
}

// --- Clock ---
function tick() {
  const n = new Date();
  const D = ['Sön', 'Mån', 'Tis', 'Ons', 'Tor', 'Fre', 'Lör'];
  const M = ['jan', 'feb', 'mar', 'apr', 'maj', 'jun', 'jul', 'aug', 'sep', 'okt', 'nov', 'dec'];
  document.getElementById('clock').textContent =
    String(n.getHours()).padStart(2, '0') + ':' + String(n.getMinutes()).padStart(2, '0');
  document.getElementById('date').textContent = D[n.getDay()] + ' ' + n.getDate() + ' ' + M[n.getMonth()];
}
setInterval(tick, 1000);
tick();

// --- Nameday ---
async function nameday() {
  const n = new Date();
  const url = `https://sholiday.faboul.se/dagar/v2.1/${n.getFullYear()}/${String(n.getMonth() + 1).padStart(2, '0')}/${String(n.getDate()).padStart(2, '0')}`;
  try {
    const d = await api(url);
    const names = d.dagar?.[0]?.namnsdag;
    document.getElementById('nameday').textContent = names?.length ? 'Namnsdag: ' + names.join(' & ') : '';
  } catch (e) {
    document.getElementById('nameday').textContent = '';
  }
}

// --- Weather ---
const COORDS = {
  kungsbacka: { lat: 57.49, lon: 12.08 }, göteborg: { lat: 57.71, lon: 11.97 },
  stockholm: { lat: 59.33, lon: 18.07 }, malmö: { lat: 55.60, lon: 13.00 },
  halmstad: { lat: 56.67, lon: 12.86 }, varberg: { lat: 57.11, lon: 12.25 },
  falkenberg: { lat: 56.90, lon: 12.49 }, borås: { lat: 57.72, lon: 12.94 },
  linköping: { lat: 58.41, lon: 15.62 }, uppsala: { lat: 59.86, lon: 17.64 },
  västerås: { lat: 59.61, lon: 16.55 }, karlstad: { lat: 59.38, lon: 13.50 },
  lund: { lat: 55.70, lon: 13.19 }, helsingborg: { lat: 56.05, lon: 12.69 },
  kristianstad: { lat: 56.03, lon: 14.15 }, ystad: { lat: 55.43, lon: 13.82 },
  örebro: { lat: 59.27, lon: 15.21 }, jönköping: { lat: 57.78, lon: 14.16 },
  norrköping: { lat: 58.59, lon: 16.19 }, eskilstuna: { lat: 59.37, lon: 16.51 },
  gävle: { lat: 60.67, lon: 17.14 }, sandviken: { lat: 60.62, lon: 16.78 },
  falun: { lat: 60.61, lon: 15.63 }, borlänge: { lat: 60.48, lon: 15.43 },
  sundsvall: { lat: 62.39, lon: 17.31 }, härnösand: { lat: 62.63, lon: 17.94 },
  umeå: { lat: 63.83, lon: 20.26 }, skellefteå: { lat: 64.75, lon: 20.95 },
  luleå: { lat: 65.58, lon: 22.15 }, piteå: { lat: 65.32, lon: 21.48 },
  kiruna: { lat: 67.86, lon: 20.23 }
};
const WMO = {
  0: '☀️ Klart', 1: '🌤️ Mest klart', 2: '⛅ Växlande', 3: '☁️ Mulet', 45: '🌫️ Dimma',
  51: '🌦️ Duggregn', 61: '🌧️ Regn', 63: '🌧️ Regn', 65: '🌧️ Kraftigt regn',

};

// Best-effort: find the COORDS entry whose key appears in a free-text station name.
function coordsForStationName(name, fallback) {
  if (!name) return fallback;
  const n = name.toLowerCase();
  for (const [k, v] of Object.entries(COORDS)) {
    if (n.includes(k)) return v;
  }
  return fallback;
}

async function weather() {
  const c = coordsForStationName(stations.from?.name, COORDS.kungsbacka);
  try {
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${c.lat}&longitude=${c.lon}&daily=weathercode,temperature_2m_max,temperature_2m_min&timezone=Europe/Stockholm&forecast_days=3`;
    const d = await (await fetch(url)).json();
    const lbl = ['Idag', 'Imorgon', 'Övermorgon'];
    document.getElementById('weather').innerHTML = d.daily.time.map((t, i) => {
      const w = WMO[d.daily.weathercode[i]] || '❓ Okänt';
      const [ico, dsc] = w.split(' ');
      return `<div class="weather-day">
        <div class="weather-lbl">${lbl[i]}</div>
        <div class="weather-ico">${ico}</div>
        <div class="weather-tmp">${Math.round(d.daily.temperature_2m_max[i])}°<span class="lo">${Math.round(d.daily.temperature_2m_min[i])}°</span></div>
        <div class="weather-dsc">${dsc || ''}</div>
      </div>`;
    }).join('');
  } catch (e) {
    document.getElementById('weather').innerHTML = '<div class="empty">Väder ej tillgängligt</div>';
  }
}

// --- Work info: rain check for Kungsbacka + Göteborg, commute window 07-18 ---
const RAIN_CODES = new Set([51, 53, 55, 56, 57, 61, 63, 65, 66, 67, 80, 81, 82, 95, 96, 99]);

async function checkTownRain(lat, lon) {
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=precipitation_probability,precipitation,weathercode&timezone=Europe/Stockholm&forecast_days=1`;
  const d = await (await fetch(url)).json();
  const h = d.hourly;
  let maxProb = 0;
  let anyRainCode = false;
  for (let i = 0; i < h.time.length; i++) {
    const hour = parseInt(h.time[i].slice(11, 13), 10);
    if (hour < 7 || hour > 18) continue;
    const prob = h.precipitation_probability?.[i] ?? 0;
    const precip = h.precipitation?.[i] ?? 0;
    const code = h.weathercode?.[i];
    if (prob > maxProb) maxProb = prob;
    if (precip > 0.1 || RAIN_CODES.has(code)) anyRainCode = true;
  }
  return { rain: anyRainCode || maxProb >= 40, maxProb };
}

async function workInfo() {
  const el = document.getElementById('workinfoContent');
  try {
    const [kungsbacka, goteborg] = await Promise.all([
      checkTownRain(COORDS.kungsbacka.lat, COORDS.kungsbacka.lon),
      checkTownRain(COORDS.göteborg.lat, COORDS.göteborg.lon)
    ]);
    const rain = kungsbacka.rain || goteborg.rain;
    const icon = rain ? '☔' : '☀️';
    const text = rain ? 'Regn väntas — ta med paraply' : 'Uppehåll väntas hela dagen';
    el.innerHTML = `<div class="workinfo-row">
      <span class="workinfo-icon">${icon}</span>
      <div>
        <div class="workinfo-text">${text}</div>
        <div class="workinfo-sub">Kungsbacka & Göteborg · 07–18</div>
      </div>
    </div>`;
  } catch (e) {
    el.innerHTML = '<span class="empty">Work info ej tillgängligt</span>';
  }
}

function findRegion(name) {
  if (!name) return null;
  const n = name.toLowerCase();
  return REGIONS.find(r => r.kw.some(k => n.includes(k))) || null;
}

function slugify(str) {
  return str.toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .replace(/[æ]/g, 'ae').replace(/[ø]/g, 'o').replace(/[ð]/g, 'd').replace(/[þ]/g, 'th')
    .replace(/[^a-z0-9\s-]/g, '')
    .replace(/\s+/g, '-').replace(/-+/g, '-').replace(/^-|-$/g, '');
}

async function parseAtom(url, max) {
  const items = [];
  try {
    const r = await fetch(url);
    if (!r.ok) return items;
    const xml = new DOMParser().parseFromString(await r.text(), 'text/xml');
    for (const e of xml.querySelectorAll('entry')) {
      const title = (e.querySelector('title')?.textContent || '').trim();
      const slug = slugify(title);
      const link = slug ? 'https://www.sverigesradio.se/artikel/' + slug : 'https://sverigesradio.se';
      const pub = (e.querySelector('published') || e.getElementsByTagName('published')[0])?.textContent || '';
      if (title.length > 10) {
        const t = new Date(pub);
        items.push({ title, link, time: isNaN(t) ? '' : t.toLocaleTimeString('sv-SE', { hour: '2-digit', minute: '2-digit' }) });
      }
      if (items.length >= max) break;
    }
  } catch (e) { /* feed unreachable — return what we have (possibly nothing) */ }
  return items;
}

async function news() {
  const el = document.getElementById('news');
  const region = findRegion(stations.from?.name);
  let items = [];
  if (region) items = await parseAtom('https://api.sr.se/api/rss/program/' + region.id, 2);
  const nat = await parseAtom('https://api.sr.se/api/rss/program/4540', 4);
  items.push(...nat.map(n => ({ ...n, title: n.title.replace(/^Ekot \d{2}:\d{2}\s*/, '') })).filter(n => n.title.length > 5));
  items = items.slice(0, 6);

  if (!items.length) { el.innerHTML = '<div class="empty">Inga nyheter just nu</div>'; return; }
  el.innerHTML = items.map((n, i) => `
    <a class="news-item" href="${n.link}" target="_blank">
      <span class="news-num">${i + 1}</span>
      <span class="news-text">${n.title}</span>
      <div class="news-meta">${i < (region ? 2 : 0) ? '📍 Lokalt' : 'Ekot'}${n.time ? ' · ' + n.time : ''}</div>
    </a>`).join('');
}

// --- Trips ---
async function trips() {
  const el = document.getElementById('tripResults');
  if (!cfg.apiKey || !stations.from || !stations.to) {
    el.innerHTML = '<div class="empty">Konfigurera i ⚙</div>';
    return;
  }
  el.innerHTML = '<div class="empty">Söker...</div>';
  try {
    const d = await api(`https://api.resrobot.se/v2.1/trip?originId=${stations.from.id}&destId=${stations.to.id}&format=json&numF=4&accessId=${cfg.apiKey}`);
    const t = d.Trip || [];
    if (!t.length) { el.innerHTML = '<div class="empty">Inga resor hittades</div>'; return; }

    el.innerHTML = t.map(trip => {
      const legs = trip.LegList?.Leg || [];
      if (!legs.length) return '';
      const dep = legs[0].Origin;
      const arr = legs[legs.length - 1].Destination;
      const mins = Math.round((new Date(arr.date + 'T' + arr.time) - new Date(dep.date + 'T' + dep.time)) / 60000);
      const h = Math.floor(mins / 60);
      const m = mins % 60;
      const dur = h ? h + 'h ' + m + 'm' : m + 'm';
      const xfer = Math.max(0, legs.filter(l => l.type !== 'WALK' && l.type !== 'TRSF').length - 1);

      const legsHtml = legs.map(l => {
        const isWalk = l.type === 'WALK' || l.type === 'TRSF';
        const p = l.Product || {};
        return `<div class="leg">
          <div class="leg-t">${l.Origin.time.slice(0, 5)}–${l.Destination.time.slice(0, 5)}</div>
          <div>
            <div class="leg-name${isWalk ? ' walk' : ''}">${isWalk ? '🚶 Gång' : (p.catOutL || p.name || '') + (p.num ? ' ' + p.num : '')}</div>
            <div class="leg-detail">${l.Origin.name} → ${l.Destination.name}</div>
          </div>
        </div>`;
      }).join('');

      return `<div class="trip">
        <div class="trip-head">
          <div class="trip-time">${dep.time.slice(0, 5)}<span class="arr">→</span>${arr.time.slice(0, 5)}</div>
          <div><span class="badge badge-dur">${dur}</span> <span class="badge ${xfer ? 'badge-xfer' : 'badge-direct'}">${xfer ? xfer + ' byte' : 'Direkt'}</span></div>
        </div>
        ${legsHtml}
      </div>`;
    }).join('');
  } catch (e) {
    el.innerHTML = '<div class="error">' + e.message + '</div>';
  }
}

// --- Departures ---
async function departures() {
  const el = document.getElementById('tripResults');
  if (!cfg.apiKey || !stations.from) {
    el.innerHTML = '<div class="empty">Konfigurera i ⚙</div>';
    return;
  }
  el.innerHTML = '<div class="empty">Hämtar...</div>';
  try {
    const d = await api(`https://api.resrobot.se/v2.1/departureBoard?id=${stations.from.id}&format=json&duration=90&accessId=${cfg.apiKey}`);
    const deps = d.Departure || [];
    if (!deps.length) { el.innerHTML = '<div class="empty">Inga avgångar</div>'; return; }

    el.innerHTML = deps.slice(0, 8).map(dep => {
      const p = dep.Product || dep.ProductAtStop?.[0] || {};
      const t = dep.rtTime || dep.time || '';
      const late = dep.rtTime && dep.rtTime !== dep.time;
      const eta = Math.round((new Date((dep.rtDate || dep.date) + 'T' + t) - new Date()) / 60000);
      return `<div class="dep">
        <div>
          <span class="dep-time${late ? ' late' : ''}">${t.slice(0, 5)}</span>
          <span class="dep-line">${p.catOutL || ''} ${p.num || ''}</span>
          <span class="dep-dest">${dep.direction || ''}</span>
        </div>
        <div class="dep-eta">${eta <= 0 ? 'nu' : eta + ' min'}</div>
      </div>`;
    }).join('');
  } catch (e) {
    el.innerHTML = '<div class="error">' + e.message + '</div>';
  }
}

// --- Autocomplete ---
let acTimer;
function setupAC(inputId, sugId, selId, key) {
  const inp = document.getElementById(inputId);
  const sug = document.getElementById(sugId);

  inp.addEventListener('input', () => {
    clearTimeout(acTimer);
    const q = inp.value.trim();
    if (q.length < 2) { sug.classList.remove('open'); return; }
    if (!cfg.apiKey) { sug.innerHTML = '<div>API-nyckel saknas</div>'; sug.classList.add('open'); return; }

    acTimer = setTimeout(async () => {
      try {
        const d = await api('https://api.resrobot.se/v2.1/location.name?input=' + encodeURIComponent(q) + '&format=json&accessId=' + cfg.apiKey);
        const stops = (d.stopLocationOrCoordLocation || []).map(s => s.StopLocation).filter(Boolean);
        if (!stops.length) { sug.innerHTML = '<div>Inga resultat</div>'; sug.classList.add('open'); return; }

        sug.innerHTML = stops.slice(0, 6).map(s => `<div data-id="${s.extId}" data-name="${s.name}">${s.name}</div>`).join('');
        sug.classList.add('open');
        sug.querySelectorAll('div').forEach(el => el.onclick = () => {
          stations[key] = { id: el.dataset.id, name: el.dataset.name };
          inp.value = el.dataset.name;
          sug.classList.remove('open');
          saveS();
          document.getElementById(selId).textContent = '✓ ' + el.dataset.name;
        });
      } catch (e) {
        sug.innerHTML = '<div>Fel: ' + e.message + '</div>';
        sug.classList.add('open');
      }
    }, 350);
  });

  inp.addEventListener('blur', () => setTimeout(() => sug.classList.remove('open'), 200));
}

const modal = document.getElementById('modalBg');

function openSettings() {
  modal.classList.add('open');
  document.getElementById('inKey').value = cfg.apiKey;
  document.getElementById('inFrom').value = stations.from?.name || '';
  document.getElementById('inTo').value = stations.to?.name || '';
  document.getElementById('selFrom').textContent = stations.from ? '✓ ' + stations.from.name : '';
  document.getElementById('selTo').textContent = stations.to ? '✓ ' + stations.to.name : '';
  document.getElementById('inBathLoc').value = cfg.bathLocation || '';
  document.getElementById('inElZone').value = cfg.elZone || '';

  for (const { key, checkboxId } of SECTION_TOGGLES) {
    document.getElementById(checkboxId).checked = cfg.show[key];
  }

  pendingStocks = [...cfg.stocks];
  renderStocksList();
}

function saveSettings() {
  cfg.apiKey = document.getElementById('inKey').value.trim();
  cfg.bathLocation = document.getElementById('inBathLoc').value;
  cfg.elZone = document.getElementById('inElZone').value;
  if (pendingStocks.length) cfg.stocks = [...pendingStocks];

  const show = {};
  for (const { key, checkboxId } of SECTION_TOGGLES) {
    show[key] = document.getElementById(checkboxId).checked;
  }
  cfg.show = show;

  save();
  saveS();
  updateRoute();
  applyToggles();
  modal.classList.remove('open');

  refresh();
  news();
  window.dispatchEvent(new CustomEvent('dashboard:refresh-bath'));
  window.dispatchEvent(new CustomEvent('dashboard:refresh-elpris'));
  renderStocksWidget();
}

function clearSettings() {
  cfg = {
    apiKey: '', bathLocation: '', elZone: '',
    stocks: ['OMXSTO:OMXS30', 'OMXSTO:VOLV_B', 'OMXSTO:ERIC_B', 'OMXSTO:HM_B', 'OMXSTO:ABB', 'OMXSTO:SEB_A'],
    show: cfg.show

  stations = { from: null, to: null };
  save();
  localStorage.removeItem(STORE_S);
  updateRoute();
  document.getElementById('tripResults').innerHTML = '<div class="empty">Konfigurera i ⚙</div>';
  window.dispatchEvent(new CustomEvent('dashboard:refresh-bath'));
  window.dispatchEvent(new CustomEvent('dashboard:refresh-elpris'));

}

function shareLink() {
  const el = document.getElementById('shareOut');
  if (!cfg.apiKey) { el.textContent = 'Spara nyckel först'; return; }

  // NOTE: no passphrase is embedded here on purpose. Copy this link, then manually
  // add "&t=<ert lösenord>" yourself before sending it — that way the passphrase
  // never has to exist anywhere inside this file.
  let u = location.origin + location.pathname + '?';
  if (stations.from) u += 'from=' + encodeURIComponent(stations.from.id + ':' + stations.from.name);
  if (stations.to) u += '&to=' + encodeURIComponent(stations.to.id + ':' + stations.to.name);

  navigator.clipboard.writeText(u).then(() => el.textContent = 'Kopierad ✓ — lägg till "&t=..." manuellt innan du skickar').catch(() => el.textContent = u);
}

// --- Screensaver ---
(function () {
  const el = document.getElementById('ssLetter');
  let x = Math.random() * (innerWidth - 180);
  let y = Math.random() * (innerHeight - 180);
  let dx = 0.7;
  let dy = 0.5;
  (function animate() {
    x += dx;
    y += dy;
    if (x <= 0 || x >= innerWidth - 180) dx *= -1;
    if (y <= 0 || y >= innerHeight - 180) dy *= -1;
    el.style.transform = `translate(${x}px,${y}px)`;
    requestAnimationFrame(animate);
  })();
})();

// Varje modul är en egen HTML-fil (markup + <style> + <script>) som hämtas via
// fetch och injiceras i sin plats-div. Modulerna sköter sin egen uppdatering
// (initialt anrop + setInterval) och lyssnar på "dashboard:refresh-*"-event
// för att uppdatera sig när inställningar sparas eller station byts.
async function loadModule(slot) {
  const src = slot.dataset.module;
  try {
    const html = await (await fetch(src)).text();
    slot.innerHTML = html;
    // innerHTML kör inte <script>-taggar automatiskt — skapa nya script-element
    // och klistra in dem så att de faktiskt exekveras.
    slot.querySelectorAll('script').forEach(oldScript => {
      const newScript = document.createElement('script');
      if (oldScript.src) newScript.src = oldScript.src;
      else newScript.textContent = oldScript.textContent;
      oldScript.replaceWith(newScript);
    });
  } catch (e) {
    slot.innerHTML = `<div class="empty">Kunde inte ladda modul: ${src}</div>`;
  }
}
document.querySelectorAll('[data-module]').forEach(loadModule);

// --- Init ---
load();
setupAC('inFrom', 'sugFrom', 'selFrom', 'from');
setupAC('inTo', 'sugTo', 'selTo', 'to');
updateRoute();
applyToggles();
if (!cfg.apiKey || !stations.from) {
  modal.classList.add('open');
} else {
  refresh();
}
news();
nameday();
weather();
workInfo();
renderStocksWidget();

setInterval(news, 15 * 60000);
setInterval(refresh, 30 * 60000);
setInterval(nameday, 3600000);
setInterval(weather, 1800000);
setInterval(workInfo, 1800000);
</script>
