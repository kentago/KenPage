<!--
  Modul: Badtemperatur
  ---------------------
  Visar de 3 närmaste badplatserna (Havs- och vattenmyndighetens öppna data)
  utifrån antingen en manuell platsöverstyrning (cfg.bathLocation) eller
  vald "från"-station (stations.from), med COORDS-uppslag som fallback.

  Beroenden från huvudskalet (dashboard.html) — måste finnas laddade FÖRE denna modul:
    - cfg, stations           (globala state-objekt, deklarerade med let i huvudskriptet)
    - COORDS                  (stad -> {lat,lon}-uppslag)
    - coordsForStationName()  (hjälpfunktion för att matcha stationsnamn mot COORDS)

  Publikt gränssnitt mot skalet:
    - Lyssnar på eventet "dashboard:refresh-bath" (dispatchas t.ex. efter sparade inställningar)
    - Kör bathTemp() själv vid laddning + var 60:e minut
-->
<div class="bath" id="bathWrap">
  <div class="bath-title">🏖️ Badtemperatur</div>
  <div class="bath-items" id="bathItems"><span class="empty">Hämtar...</span></div>
</div>

<style>
  .bath{border-top:1px solid var(--border);margin-top:12px;padding-top:12px}
  .bath-title{font:600 11px/1 'Oswald',sans-serif;letter-spacing:1.5px;text-transform:uppercase;color:var(--ice);margin-bottom:10px}
  .bath-items{display:flex;gap:12px}
  .bath-item{flex:1;background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:10px 12px;text-align:center}
  .bath-name{font:500 12px/1.2 'Oswald',sans-serif;color:var(--text);margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .bath-temp{font:700 24px/1 'Oswald',sans-serif;color:var(--amber)}
  .bath-temp .unit{font-size:14px;color:var(--muted);font-weight:500}
  .bath-warn{font-size:10px;color:var(--bad);margin-top:4px}
</style>

<script>
  const HAV_BASE = 'https://gw.havochvatten.se/external-public/bathing-waters/v2';
  let bathCache = null;
  let bathFcCache = null;

  async function bathTemp() {
    const el = document.getElementById('bathItems');
    const c = cfg.bathLocation && COORDS[cfg.bathLocation]
      ? COORDS[cfg.bathLocation]
      : coordsForStationName(stations.from?.name, COORDS.kungsbacka);

    try {
      // Fetch all bathing waters + all forecasts (cached for the session)
      if (!bathCache) {
        const allRes = await fetch(HAV_BASE + '/bathing-waters');
        if (!allRes.ok) throw new Error('HTTP ' + allRes.status);
        const allData = await allRes.json();
        bathCache = allData.watersAndAdvisories || [];
      }
      if (!bathFcCache) {
        const fcRes = await fetch(HAV_BASE + '/forecasts');
        if (fcRes.ok) {
          const fcData = await fcRes.json();
          bathFcCache = {};
          for (const f of fcData.forecasts || []) bathFcCache[f.bathingWaterId] = f.waterForecasts || [];
        } else {
          bathFcCache = {};
        }
      }

      // Score every bathing water by distance from the reference point,
      // keeping only ones that actually have a forecast.
      const now = new Date().getHours();
      const scored = [];
      for (const w of bathCache) {
        const bw = w.bathingWater;
        const pos = bw.samplingPointPosition;
        if (!pos) continue;
        const lat = parseFloat(pos.latitude);
        const lon = parseFloat(pos.longitude);
        if (!lat || !lon) continue;
        const fc = bathFcCache[bw.id];
        if (!fc || !fc.length) continue; // no forecast available — skip

        // Find the forecast entry closest to the current hour.
        let best = fc[0];
        let bestDiff = 99;
        for (const f of fc) {
          const diff = Math.abs(parseInt(f.measHour) - now);
          if (diff < bestDiff) { bestDiff = diff; best = f; }
        }
        const d = Math.sqrt((lat - c.lat) ** 2 + (lon - c.lon) ** 2);
        scored.push({ d, name: bw.name, temp: best.waterTemp, advise: w.adviceAgainstBathing || [] });
      }
      scored.sort((a, b) => a.d - b.d);
      const top3 = scored.slice(0, 3);

      if (!top3.length) {
        el.innerHTML = '<span class="empty">Ingen badtemp tillgänglig</span>';
        return;
      }
      el.innerHTML = top3.map(f => {
        const hasWarn = f.advise.length > 0;
        return `<div class="bath-item">
          <div class="bath-name" title="${f.name}">${f.name}</div>
          <div class="bath-temp">${f.temp}<span class="unit">°C</span></div>
          ${hasWarn ? '<div class="bath-warn">⚠ Avrådan</div>' : ''}
        </div>`;
      }).join('');
    } catch (e) {
      el.innerHTML = '<span class="empty">Kunde ej hämta badtemp</span>';
    }
  }

  // Låt skalet (eller andra moduler) be oss uppdatera utan att känna till funktionsnamnet.
  window.addEventListener('dashboard:refresh-bath', bathTemp);

  bathTemp();
  setInterval(bathTemp, 3600000);
</script>
